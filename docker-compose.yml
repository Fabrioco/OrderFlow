services:
  api:
    build:
      context: ./orderflow-backend
      dockerfile: ./Dockerfile
    image: orderflow-api:latest
    container_name: orderflow-api
    volumes:
      - ./orderflow-backend:/app
      - /app/node_modules
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:5432/${DB_NAME}?schema=public
    depends_on:
      - db
    env_file:
      - .env

  db:
    image: postgres:15
    container_name: orderflow-db
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
