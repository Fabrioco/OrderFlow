services:
  api:
    build:
      context: ./orderflow-backend
      dockerfile: ./Dockerfile
    image: orderflow-api:latest
    container_name: orderflow-api
    volumes:
      - ./orderflow-backend:/app
      - /app/node_modules
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}/${DB_NAME}
      - PORT=${API_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db
    env_file:
      - .env

  db:
    image: postgres:15
    container_name: orderflow-db
    env_file:
      - .env
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: orderflow
      POSTGRES_PASSWORD: orderflow
      POSTGRES_DB: orderflow
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
